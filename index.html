<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>訓練メニュー作成 – セラピスト</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563EB">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="自主">
<style>
:root {
  --bg: #F7F8FA;
  --surface: #fff;
  --border: #E4E7EC;
  --text: #1A1D23;
  --sub: #6B7280;
  --accent: #2563EB;
  --accent-bg: #EFF6FF;
  --green: #16A34A;
  --green-bg: #F0FDF4;
  --orange: #EA580C;
  --orange-bg: #FFF7ED;
  --pink: #DB2777;
  --pink-bg: #FDF2F8;
  --r: 12px;
  --rs: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Hiragino Sans', 'Yu Gothic', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; }

header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.header-title { font-size: 17px; font-weight: 600; }
.header-badge {
  font-size: 13px; background: var(--accent); color: #fff;
  padding: 3px 12px; border-radius: 999px; display: none;
}
.header-badge.on { display: inline-block; }

.wrap { max-width: 860px; margin: 0 auto; padding: 20px 16px 80px; }

/* フィルター */
.filter-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 16px; margin-bottom: 16px;
}
.filter-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.filter-label { font-size: 12px; font-weight: 600; color: var(--sub); letter-spacing:.05em; text-transform: uppercase; }
.clear-link { font-size: 12px; color: var(--accent); background: none; border: none; cursor: pointer; }
.clear-link:hover { text-decoration: underline; }

.frow { margin-bottom: 10px; }
.frow:last-child { margin-bottom: 0; }
.fname { font-size: 12px; color: var(--sub); margin-bottom: 6px; }
.pills { display: flex; flex-wrap: wrap; gap: 6px; }
.pill {
  font-size: 13px; padding: 5px 13px; border-radius: 999px;
  border: 1.5px solid var(--border); background: var(--surface);
  color: var(--sub); cursor: pointer; user-select: none; transition: all .12s;
}
.pill:hover { border-color: #9CA3AF; color: var(--text); }
.pill.ap { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); font-weight: 500; }
.pill.at { background: var(--green-bg); color: var(--green); border-color: var(--green); font-weight: 500; }
.pill.ab { background: var(--orange-bg); color: var(--orange); border-color: var(--orange); font-weight: 500; }
.pill.ac { background: var(--pink-bg); color: var(--pink); border-color: var(--pink); font-weight: 500; }

/* 結果ヘッダー */
.rhead { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.rcount { font-size: 13px; color: var(--sub); }

/* カードグリッド */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 10px; }

.ecard {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: var(--r); padding: 14px; cursor: pointer; transition: all .12s;
}
.ecard:hover { border-color: #9CA3AF; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
.ecard.sel { border-color: var(--accent); background: var(--accent-bg); }

.ecard-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
.ecard-icon { font-size: 28px; line-height: 1; }
.chk {
  width: 22px; height: 22px; border-radius: 50%;
  border: 2px solid var(--border); background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; flex-shrink: 0; transition: all .12s;
}
.ecard.sel .chk { background: var(--accent); border-color: var(--accent); color: #fff; }

.ename { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.etags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
.tag {
  font-size: 10px; padding: 2px 7px; border-radius: 999px; font-weight: 500;
}
.tp { background: var(--accent-bg); color: var(--accent); }
.tt { background: var(--green-bg); color: var(--green); }
.tb { background: var(--orange-bg); color: var(--orange); }
.tc { background: var(--pink-bg); color: var(--pink); }

/* 設定パネル（モーダル風） */
.cfg-panel {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface); border-top: 1px solid var(--border);
  padding: 16px 20px 28px; z-index: 200;
  transform: translateY(100%); transition: transform .22s ease;
  max-width: 860px; margin: 0 auto;
}
.cfg-panel.open { transform: translateY(0); }

.cfg-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.cfg-title { font-size: 15px; font-weight: 600; }
.cfg-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--sub); line-height: 1; }

.cfg-row { margin-bottom: 14px; }
.cfg-label { font-size: 13px; font-weight: 600; color: var(--sub); margin-bottom: 8px; }
.cfg-chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  font-size: 15px; padding: 8px 16px; border-radius: 999px;
  border: 1.5px solid var(--border); background: var(--bg);
  color: var(--text); cursor: pointer; user-select: none; transition: all .12s;
}
.chip:hover { border-color: #9CA3AF; }
.chip.chosen { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }

/* 患者画面ボタン */
.go-btn {
  position: fixed; bottom: 20px; right: 20px; z-index: 300;
  background: var(--accent); color: #fff;
  font-size: 15px; font-weight: 600; padding: 13px 22px;
  border-radius: 999px; border: none; cursor: pointer;
  box-shadow: 0 4px 14px rgba(37,99,235,.35);
  display: none; align-items: center; gap: 8px;
  transition: background .12s;
}
.go-btn.on { display: flex; }
.go-btn:hover { background: #1D4ED8; }

.empty { text-align: center; padding: 60px 20px; color: var(--sub); font-size: 14px; grid-column: 1/-1; }
.empty-icon { font-size: 40px; margin-bottom: 12px; }

/* 選択済みリスト */
.sel-list {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 14px 16px; margin-bottom: 16px; display: none;
}
.sel-list.on { display: block; }
.sel-list-title { font-size: 12px; font-weight: 600; color: var(--sub); letter-spacing:.05em; text-transform:uppercase; margin-bottom: 10px; }
.sel-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px;
}
.sel-item:last-child { border-bottom: none; }
.sel-item-icon { font-size: 20px; }
.sel-item-name { flex: 1; font-weight: 500; }
.sel-item-info { font-size: 12px; color: var(--sub); text-align: right; line-height: 1.5; }
.edit-btn {
  font-size: 12px; color: var(--accent); background: none; border: 1px solid var(--accent);
  border-radius: var(--rs); padding: 3px 8px; cursor: pointer;
}
</style>
</head>
<body>

<header>
  <div class="header-title">🩺 セラピスト — 訓練メニュー作成</div>
  <span class="header-badge" id="hbadge"></span>
</header>

<div class="wrap">

  <!-- フィルター -->
  <div class="filter-box">
    <div class="filter-top">
      <span class="filter-label">🔍 絞り込み</span>
      <button class="clear-link" onclick="clearFilters()">すべてクリア</button>
    </div>
    <div class="frow">
      <div class="fname">🧍 姿勢</div>
      <div class="pills" id="fp">
        <span class="pill" data-g="p" data-v="臥位" onclick="tog(this)">臥位</span>
        <span class="pill" data-g="p" data-v="腹臥位" onclick="tog(this)">腹臥位</span>
        <span class="pill" data-g="p" data-v="側臥位" onclick="tog(this)">側臥位</span>
        <span class="pill" data-g="p" data-v="端坐位" onclick="tog(this)">端坐位</span>
        <span class="pill" data-g="p" data-v="立位" onclick="tog(this)">立位</span>
      </div>
    </div>
    <div class="frow">
      <div class="fname">💪 運動種類</div>
      <div class="pills">
        <span class="pill" data-g="t" data-v="筋トレ" onclick="tog(this)">筋トレ</span>
        <span class="pill" data-g="t" data-v="ストレッチ" onclick="tog(this)">ストレッチ</span>
        <span class="pill" data-g="t" data-v="バランス" onclick="tog(this)">バランス</span>
      </div>
    </div>
    <div class="frow">
      <div class="fname">🦵 部位</div>
      <div class="pills">
        <span class="pill" data-g="b" data-v="上肢" onclick="tog(this)">上肢</span>
        <span class="pill" data-g="b" data-v="下肢" onclick="tog(this)">下肢</span>
        <span class="pill" data-g="b" data-v="体幹" onclick="tog(this)">体幹</span>
      </div>
    </div>
    <div class="frow">
      <div class="fname">🚶 有酸素</div>
      <div class="pills">
        <span class="pill" data-g="c" data-v="歩行" onclick="tog(this)">歩行</span>
        <span class="pill" data-g="c" data-v="階段" onclick="tog(this)">階段</span>
        <span class="pill" data-g="c" data-v="自転車" onclick="tog(this)">自転車</span>
      </div>
    </div>
  </div>

  <!-- 選択済みリスト -->
  <div class="sel-list" id="selList">
    <div class="sel-list-title">✅ 選択中の訓練</div>
    <div id="selItems"></div>
  </div>

  <!-- 結果 -->
  <div class="rhead">
    <span class="rcount" id="rcnt"></span>
  </div>
  <div class="grid" id="grid"></div>

</div>

<!-- 設定パネル -->
<div class="cfg-panel" id="cfgPanel">
  <div class="cfg-head">
    <span class="cfg-title" id="cfgName"></span>
    <button class="cfg-close" onclick="closePanel()">×</button>
  </div>

  <div class="cfg-row">
    <div class="cfg-label">🔢 回数</div>
    <div class="cfg-chips" id="chipsReps">
      <span class="chip" data-group="reps" data-val="5"  onclick="pickChip(this)">5回</span>
      <span class="chip" data-group="reps" data-val="10" onclick="pickChip(this)">10回</span>
      <span class="chip" data-group="reps" data-val="15" onclick="pickChip(this)">15回</span>
      <span class="chip" data-group="reps" data-val="20" onclick="pickChip(this)">20回</span>
      <span class="chip" data-group="reps" data-val="30" onclick="pickChip(this)">30回</span>
    </div>
  </div>

  <div class="cfg-row">
    <div class="cfg-label">🔄 セット数</div>
    <div class="cfg-chips" id="chipsSets">
      <span class="chip" data-group="sets" data-val="1" onclick="pickChip(this)">1セット</span>
      <span class="chip" data-group="sets" data-val="2" onclick="pickChip(this)">2セット</span>
      <span class="chip" data-group="sets" data-val="3" onclick="pickChip(this)">3セット</span>
      <span class="chip" data-group="sets" data-val="5" onclick="pickChip(this)">5セット</span>
    </div>
  </div>

  <div class="cfg-row">
    <div class="cfg-label">⏱️ キープ時間</div>
    <div class="cfg-chips" id="chipsSec">
      <span class="chip" data-group="sec" data-val=""   onclick="pickChip(this)">なし</span>
      <span class="chip" data-group="sec" data-val="10" onclick="pickChip(this)">10秒</span>
      <span class="chip" data-group="sec" data-val="20" onclick="pickChip(this)">20秒</span>
      <span class="chip" data-group="sec" data-val="30" onclick="pickChip(this)">30秒</span>
      <span class="chip" data-group="sec" data-val="60" onclick="pickChip(this)">60秒</span>
    </div>
  </div>

  <button style="width:100%;margin-top:14px;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);font-size:16px;font-weight:600;cursor:pointer;" onclick="savePanel()">✅ 保存して追加</button>
</div>

<!-- 患者画面へボタン -->
<button class="go-btn" id="goBtn" onclick="goPatient()">👴 患者画面を開く</button>

<script>
const EX = [
  { id:1, icon:"🦵", name:"大腿四頭筋トレーニング", p:["臥位"], t:["筋トレ"], b:["下肢"], c:[] },
  { id:2, icon:"🏋️", name:"ブリッジ運動",           p:["臥位"], t:["筋トレ"], b:["下肢","体幹"], c:[] },
  { id:3, icon:"🧘", name:"ハムストリングスストレッチ", p:["臥位"], t:["ストレッチ"], b:["下肢"], c:[] },
  { id:4, icon:"🤸", name:"体幹回旋ストレッチ",       p:["側臥位"], t:["ストレッチ"], b:["体幹"], c:[] },
  { id:5, icon:"💪", name:"肩関節外転運動",            p:["側臥位"], t:["筋トレ"], b:["上肢"], c:[] },
  { id:6, icon:"🙆", name:"肩甲骨寄せ運動",            p:["端坐位"], t:["筋トレ"], b:["上肢","体幹"], c:[] },
  { id:7, icon:"✋", name:"握力訓練",                  p:["端坐位"], t:["筋トレ"], b:["上肢"], c:[] },
  { id:8, icon:"🪑", name:"端坐位バランス練習",         p:["端坐位"], t:["バランス"], b:["体幹"], c:[] },
  { id:9, icon:"🧍", name:"立位バランス練習",           p:["立位"], t:["バランス"], b:["下肢","体幹"], c:[] },
  { id:10, icon:"🦶", name:"カーフレイズ",             p:["立位"], t:["筋トレ"], b:["下肢"], c:[] },
  { id:11, icon:"🚶", name:"歩行練習",                 p:["立位"], t:[], b:["下肢"], c:["歩行"] },
  { id:12, icon:"🪜", name:"階段昇降練習",             p:["立位"], t:[], b:["下肢"], c:["階段"] },
  { id:13, icon:"🚲", name:"エルゴメーター",           p:["端坐位"], t:[], b:["下肢"], c:["自転車"] },
];

const filters = { p: new Set(), t: new Set(), b: new Set(), c: new Set() };
const selected = {};   // id -> { reps, sets, sec }
let editingId = null;

function pickChip(el) {
  const g = el.dataset.group;
  document.querySelectorAll(`.chip[data-group="${g}"]`).forEach(c => c.classList.remove('chosen'));
  el.classList.add('chosen');
}

function getChip(group) {
  const el = document.querySelector(`.chip[data-group="${group}"].chosen`);
  return el ? el.dataset.val : '';
}

function tog(el) {
  const g = el.dataset.g, v = el.dataset.v;
  const cls = {p:'ap',t:'at',b:'ab',c:'ac'}[g];
  if (filters[g].has(v)) { filters[g].delete(v); el.classList.remove(cls); }
  else { filters[g].add(v); el.classList.add(cls); }
  render();
}
function clearFilters() {
  Object.keys(filters).forEach(g => {
    filters[g].clear();
    document.querySelectorAll(`[data-g="${g}"]`).forEach(el => el.className = 'pill');
  });
  render();
}

function match(ex) {
  const ok = (g, f) => filters[g].size === 0 || [...filters[g]].some(v => ex[f].includes(v));
  return ok('p','p') && ok('t','t') && ok('b','b') && ok('c','c');
}

function tags(ex) {
  return [
    ...ex.p.map(v=>`<span class="tag tp">${v}</span>`),
    ...ex.t.map(v=>`<span class="tag tt">${v}</span>`),
    ...ex.b.map(v=>`<span class="tag tb">${v}</span>`),
    ...ex.c.map(v=>`<span class="tag tc">${v}</span>`),
  ].join('');
}

function render() {
  const matched = EX.filter(match);
  document.getElementById('rcnt').textContent = `${matched.length} 件`;

  if (!matched.length) {
    document.getElementById('grid').innerHTML = `<div class="empty"><div class="empty-icon">🔍</div>絞り込み結果がありません</div>`;
    return;
  }
  document.getElementById('grid').innerHTML = matched.map(ex => {
    const s = selected[ex.id];
    const isSel = !!s;
    return `<div class="ecard${isSel?' sel':''}" onclick="clickCard(${ex.id})">
      <div class="ecard-top">
        <div class="ecard-icon">${ex.icon}</div>
        <div class="chk">${isSel?'✓':''}</div>
      </div>
      <div class="ename">${ex.name}</div>
      <div class="etags">${tags(ex)}</div>
    </div>`;
  }).join('');

  renderSelList();
  updateBadge();
}

function clickCard(id) {
  if (selected[id]) {
    delete selected[id];
    render();
  } else {
    selected[id] = { reps:'', sets:'', sec:'', rest:'', memo:'' };
    openPanel(id);
  }
}

function openPanel(id) {
  editingId = id;
  const ex = EX.find(e => e.id === id);
  const s = selected[id] || {};
  document.getElementById('cfgName').textContent = ex.icon + '  ' + ex.name;

  // チップをリセットして既存値を復元
  ['reps','sets','sec'].forEach(g => {
    document.querySelectorAll(`.chip[data-group="${g}"]`).forEach(c => {
      c.classList.toggle('chosen', c.dataset.val === (s[g] || ''));
    });
  });
  // キープ「なし」を初期選択
  if (!s.sec) {
    const none = document.querySelector('.chip[data-group="sec"][data-val=""]');
    if (none) none.classList.add('chosen');
  }

  document.getElementById('cfgPanel').classList.add('open');
}

function closePanel() {
  document.getElementById('cfgPanel').classList.remove('open');
  editingId = null;
}

function savePanel() {
  if (!editingId) return;
  selected[editingId] = {
    reps: getChip('reps'),
    sets: getChip('sets'),
    sec:  getChip('sec'),
  };
  closePanel();
  render();
}

function renderSelList() {
  const ids = Object.keys(selected).map(Number);
  const list = document.getElementById('selList');
  const items = document.getElementById('selItems');
  if (!ids.length) { list.classList.remove('on'); return; }
  list.classList.add('on');
  items.innerHTML = ids.map(id => {
    const ex = EX.find(e => e.id === id);
    const s = selected[id];
    const info = [
      s.reps ? `${s.reps}回` : '',
      s.sets ? `${s.sets}セット` : '',
      s.sec  ? `${s.sec}秒キープ` : '',
    ].filter(Boolean).join(' × ') || '未設定';
    return `<div class="sel-item">
      <div class="sel-item-icon">${ex.icon}</div>
      <div class="sel-item-name">${ex.name}</div>
      <div class="sel-item-info">${info}</div>
      <button class="edit-btn" onclick="openPanel(${id});event.stopPropagation()">編集</button>
    </div>`;
  }).join('');
}

function updateBadge() {
  const n = Object.keys(selected).length;
  const b = document.getElementById('hbadge');
  const g = document.getElementById('goBtn');
  if (n) { b.textContent = `${n}件選択中`; b.classList.add('on'); g.classList.add('on'); }
  else   { b.classList.remove('on'); g.classList.remove('on'); }
}

function goPatient() {
  const ids = Object.keys(selected).map(Number);
  if (!ids.length) return;
  const params = ids.map(id => {
    const s = selected[id];
    return `id=${id}&reps=${encodeURIComponent(s.reps)}&sets=${encodeURIComponent(s.sets)}&sec=${encodeURIComponent(s.sec)}`;
  }).join('|');
  window.open(`patient.html?plan=${encodeURIComponent(params)}`, '_blank');
}

render();

// PWA: サービスワーカー登録
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
